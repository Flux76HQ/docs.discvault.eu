name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify tag matches VERSION
        shell: bash
        run: test "v$(tr -d '\r\n' < VERSION)" = "${GITHUB_REF_NAME}"
      - run: pnpm check
      - run: pnpm build
      - run: pnpm smoke
      - name: Package static site
        shell: bash
        run: tar -czf "discvault-docs-${GITHUB_REF_NAME}.tar.gz" -C dist .
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "discvault-docs-${GITHUB_REF_NAME}.tar.gz" --generate-notes --verify-tag
