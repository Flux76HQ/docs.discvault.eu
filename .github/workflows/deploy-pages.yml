name: CI and Deploy GitHub Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Frozen install
        run: pnpm install --frozen-lockfile
      - name: Formatting
        run: pnpm format:check
      - name: Credential scan
        run: pnpm credentials:check
      - name: Full project check
        run: pnpm check
        env:
          VERSION_GUARD_BASE: ${{ github.event.pull_request.base.sha }}
      - name: Typecheck
        run: pnpm typecheck

  build:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Frozen install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Smoke test
        run: pnpm smoke
      - name: Share build with Lighthouse
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.run_id }}
          path: dist
          retention-days: 1
      - name: Package Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Frozen install
        run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: site-${{ github.run_id }}
          path: dist
      - name: Lighthouse mobile
        run: pnpm exec lhci autorun
      - name: Lighthouse desktop
        run: pnpm exec lhci autorun --collect.settings.preset=desktop

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [validate, build, lighthouse]
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/configure-pages@v5
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
